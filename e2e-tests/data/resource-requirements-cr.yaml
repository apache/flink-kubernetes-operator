apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  namespace: default
  name: flink-example-resource-requirements
spec:
  image: flink:1.20
  flinkVersion: v1_20
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    kubernetes.operator.snapshot.resource.enabled: "false"
  serviceAccount: flink
  podTemplate:
    spec:
      initContainers:
        - name: artifacts-fetcher
          image: busybox:1.35.0
          imagePullPolicy: IfNotPresent
          # Use wget or other tools to get user jars from remote storage
          command: [ 'wget', 'STREAMING_EXAMPLES_JAR_URL', '-O', '/flink-artifact/myjob.jar' ]
          volumeMounts:
            - mountPath: /flink-artifact
              name: flink-artifact
      containers:
        # Do not change the main container name
        - name: flink-main-container
          volumeMounts:
            - mountPath: /opt/flink/usrlib
              name: flink-artifact
      volumes:
        - name: flink-artifact
          emptyDir: { }
  # requests and limits give a 2.0 limit factor for both cpu and memory; the test
  # asserts these are applied to the JM/TM containers.
  jobManager:
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
  taskManager:
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
  job:
    jarURI: local:///opt/flink/usrlib/myjob.jar
    entryClass: org.apache.flink.streaming.examples.statemachine.StateMachineExample
    parallelism: 1
    upgradeMode: stateless
  mode: native
